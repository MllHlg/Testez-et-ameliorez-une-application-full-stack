<div class="app">
  <mat-toolbar color="primary" fxLayout="row" fxLayoutAlign="space-between center">
    <span>Yoga app</span>
    @if ($isLogged() | async) {
    <div>
      <span routerLink="sessions" class="link" data-testid="sessions-page">Sessions</span>
      <span routerLink="me" class="link" data-testid="account-page">Account</span>
      <span (click)="logout()" class="link" data-testid="logout">Logout</span>
    </div>
    } @else {
    <div>
      <a routerLink="/login" routerLinkActive="active" class="link" data-testid="login">Login</a>
      <a routerLink="/register" routerLinkActive="active" class="link" data-testid="register">Register</a>
    </div>
    }
  </mat-toolbar>
  <div>
    <router-outlet></router-outlet>
  </div>
</div>
